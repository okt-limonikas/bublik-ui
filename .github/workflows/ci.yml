name: CI

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

  workflow_dispatch:
    inputs:
      frontend_repository:
        description: 'Frontend repo (owner/bublik-ui), may be a fork'
        required: false
        default: ''
      frontend_ref:
        description: 'Frontend ref (branch/tag/sha); empty = triggering ref'
        required: false
        default: ''
      backend_repository:
        description: 'Backend repo (owner/bublik), may be a fork'
        required: false
        default: ''
      backend_ref:
        description: 'Backend ref (branch/tag/sha)'
        required: false
        default: 'main'

env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Code Linting
        run: pnpm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Code Testing
        run: pnpm run test

  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check code formatting
        run: pnpm run format:check

  check-build:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Bublik UI
        run: pnpm run build

  check-json-logs-build:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check JSON App
        run: pnpm run bublik-json:build

  e2e:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 0
    steps:
      - name: Resolve frontend/backend revisions
        id: rev
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FE_REPO="${{ github.event.pull_request.head.repo.full_name }}"
            FE_REF="${{ github.event.pull_request.head.sha }}"
          else
            FE_REPO="${{ github.repository }}"
            FE_REF="${{ github.sha }}"
          fi
          # workflow_dispatch overrides (empty for other events)
          [ -n "${{ inputs.frontend_repository }}" ] && FE_REPO="${{ inputs.frontend_repository }}"
          [ -n "${{ inputs.frontend_ref }}" ] && FE_REF="${{ inputs.frontend_ref }}"
          BE_REPO="${{ inputs.backend_repository }}"
          [ -z "$BE_REPO" ] && BE_REPO="${{ github.repository_owner }}/bublik"
          BE_REF="${{ inputs.backend_ref }}"
          [ -z "$BE_REF" ] && BE_REF="main"
          {
            echo "fe_repo=$FE_REPO"
            echo "fe_ref=$FE_REF"
            echo "be_repo=$BE_REPO"
            echo "be_ref=$BE_REF"
          } >> "$GITHUB_OUTPUT"
          echo "Frontend: $FE_REPO @ $FE_REF"
          echo "Backend:  $BE_REPO @ $BE_REF"

      - name: Checkout bublik-docker
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/bublik-docker
          path: bublik-docker
          submodules: false

      - name: Init pinned submodules (test-environment, docs)
        working-directory: bublik-docker
        run: git submodule update --init --depth 1 test-environment bublik-release

      - name: Checkout frontend (bublik-ui) revision
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.rev.outputs.fe_repo }}
          ref: ${{ steps.rev.outputs.fe_ref }}
          path: bublik-docker/bublik-ui

      - name: Checkout backend (bublik) revision
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.rev.outputs.be_repo }}
          ref: ${{ steps.rev.outputs.be_ref }}
          path: bublik-docker/bublik

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install bublik-e2e CLI
        run: |
          uv tool install git+https://github.com/${{ github.repository_owner }}/bublik-e2e
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Task
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: bublik-docker/bublik-ui/pnpm-lock.yaml

      # The app is built inside Docker; these host deps are only for running
      # the Playwright suite (import + e2e) against the dockerized stack.
      - name: Install Playwright host deps
        working-directory: bublik-docker/bublik-ui
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bublik-docker/bublik-ui/pnpm-lock.yaml') }}

      # System libs (apt) only; split from the browser download so an apt-lock
      # stall can't masquerade as a frozen download and is bounded by a timeout.
      - name: Install Playwright system deps
        timeout-minutes: 10
        working-directory: bublik-docker/bublik-ui
        run: pnpm exec playwright install-deps

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 10
        working-directory: bublik-docker/bublik-ui
        run: pnpm exec playwright install chromium firefox webkit

      - name: Setup .env
        working-directory: bublik-docker
        run: |
          cp .env.example .env
          echo "BUBLIK_DOCKER_DATA_DIR=./data" >> .env
          mkdir -p data/logs/logs

      - name: Build stack from source
        working-directory: bublik-docker
        run: task build

      - name: Start services
        working-directory: bublik-docker
        run: task e2e:up

      - name: Generate fixtures
        working-directory: bublik-docker
        run: task e2e:fixtures

      - name: Import fixtures
        working-directory: bublik-docker
        run: task e2e:import:ui

      - name: Run e2e tests
        working-directory: bublik-docker
        run: task e2e

      - name: Dump service logs on failure
        if: ${{ failure() }}
        working-directory: bublik-docker
        run: docker compose -f docker-compose.yml -f docker-compose.db.yml logs --tail=200

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            bublik-docker/bublik-ui/dist/.playwright/apps/bublik
            bublik-docker/bublik-ui/playwright-report
            bublik-docker/bublik-ui/test-results
          if-no-files-found: ignore
